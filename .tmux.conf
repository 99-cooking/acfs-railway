# Full mouse support (scroll, pane select, window select, resize)
set -g mouse on

# OSC 52 clipboard integration — makes tmux copy work in browser via ttyd
set -g set-clipboard on

# Use tmux copy mode: mouse select auto-copies to clipboard via OSC 52
# Double-click selects word, triple-click selects line
# Right-click pastes from tmux buffer

# Scroll history
set -g history-limit 10000
